<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SOBO Marketing Solution | Industrial B2B E-Commerce</title>

  <!-- Preconnect to Google Fonts domains to speed up font fetching -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Load Poppins and Ubuntu fonts asynchronously to prevent render-blocking delay -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Ubuntu:wght@300;400;500;700&display=swap" media="print" onload="this.media='all'">
  <noscript>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Ubuntu:wght@300;400;500;700&display=swap">
  </noscript>

  <!-- Preload critical assets for instant LCP discovery -->
  <link rel="preload" href="/sobo_logo.webp" as="image" fetchpriority="high">
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/app/main.jsx"></script>
</body>

</html>

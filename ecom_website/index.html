<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SOBO Marketing Solution | Industrial B2B E-Commerce</title>

  <!-- Preconnect to Google Fonts domains to speed up font fetching -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Load Poppins and Ubuntu fonts asynchronously with display=swap to prevent render blocking while ensuring proper font rendering -->
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Ubuntu:wght@300;400;500;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Ubuntu:wght@300;400;500;700&display=swap" rel="stylesheet">
  </noscript>

  <!-- Preload the main logo in the header for fast initial rendering -->
  <link rel="preload" href="/sobo_logo.webp" as="image" fetchpriority="high">

  <!-- Preload the Hero background image to minimize Largest Contentful Paint (LCP) -->
  <link rel="preload" href="/background.webp" as="image" type="image/webp" fetchpriority="high">
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/app/main.jsx"></script>
</body>

</html>
